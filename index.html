<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permadeath Media</title>
<style>
  :root {
    --bg: #0a0a0c;
    --fg: #f4f4f5;
    --accent: #ff3b3b;
    --muted: #8a8a92;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255, 59, 59, 0.08), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255, 59, 59, 0.06), transparent 45%);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
  }

  .wordmark {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1.05;
  }

  .wordmark span {
    color: var(--accent);
  }

  .tagline {
    margin-top: 1.25rem;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 600;
    color: var(--fg);
    letter-spacing: 0.01em;
  }

  .description {
    margin-top: 1rem;
    max-width: 34rem;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--muted);
  }

  .cta {
    margin-top: 2.5rem;
    display: inline-block;
    padding: 0.85rem 2rem;
    border-radius: 999px;
    background: var(--accent);
    color: #0a0a0c;
    font-weight: 700;
    font-size: 1rem;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 0 rgba(255, 59, 59, 0);
  }

  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255, 59, 59, 0.35);
  }

  footer {
    padding: 1.5rem;
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }
</style>
</head>
<body>
  <main>
    <div class="wordmark">PERMA<span>DEATH</span> MEDIA</div>
    <p class="tagline">Games that stick with you.</p>
    <p class="description">
      We make daily puzzle games. Our first game, Hexagons, is live now.
    </p>
    <a class="cta" href="https://hexagons-red.vercel.app" target="_blank" rel="noopener">Play Hexagons</a>
  </main>
  <footer>© 2026 Permadeath Media</footer>
</body>
</html>
